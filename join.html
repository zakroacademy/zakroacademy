<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f4f8;min-height:100vh;color:#1a202c}
:root{
--primary:#1a56db;--primary-dark:#1e429f;--accent:#0ea5e9;
--success:#059669;--danger:#dc2626;--warning:#d97706;
--surface:#fff;--bg:#f0f4f8;--border:#e2e8f0;
--text:#1a202c;--muted:#64748b;--light:#f8fafc
}
.app{display:flex;flex-direction:column;min-height:100vh}
.top-bar{background:#000;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-size:18px;font-weight:700;letter-spacing:0.5px}
.logo span:first-child{color:#f59e0b}
.logo span:last-child{color:#7dd3fc}
.nav-tabs{display:flex;gap:4px}
.nav-tab{background:rgba(255,255,255,0.15);border:none;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:all 0.2s}
.nav-tab.active{background:#fff;color:#1a1f6e;font-weight:600}
.nav-tab:hover:not(.active){background:rgba(255,255,255,0.25)}
.main{flex:1;overflow:auto;padding:20px}

/* ADMISSION FORM */
.stepper{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:24px;overflow-x:auto;padding:4px 0}
.step-item{display:flex;align-items:center}
.step-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;transition:all 0.3s}
.step-circle.done{background:#059669;color:#fff}
.step-circle.active{background:#1a56db;color:#fff;box-shadow:0 0 0 3px rgba(26,86,219,0.25)}
.step-circle.pending{background:#e2e8f0;color:#64748b}
.step-label{font-size:11px;color:#64748b;text-align:center;margin-top:3px;white-space:nowrap}
.step-connector{width:40px;height:2px;background:#e2e8f0;flex-shrink:0}
.step-connector.done{background:#059669}
.step-col{display:flex;flex-direction:column;align-items:center}

.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px;margin-bottom:16px}
.card-title{font-size:16px;font-weight:600;margin-bottom:16px;color:#1a202c;display:flex;align-items:center;gap:8px}
.card-title .icon{width:28px;height:28px;border-radius:8px;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-size:16px}
.form-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px}
.form-grid.cols-1{grid-template-columns:minmax(0,1fr)}
.form-grid.cols-3{grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr)}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
label{font-size:12px;font-weight:500;color:#374151}
.req{color:#dc2626}
input,select,textarea{border:1px solid #d1d5db;border-radius:7px;padding:8px 11px;font-size:14px;color:#1a202c;background:#fff;outline:none;transition:border 0.2s;width:100%}
input:focus,select:focus,textarea:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,0.1)}
input:disabled,select:disabled{background:#f9fafb;color:#9ca3af}
.checkbox-group{display:flex;flex-wrap:wrap;gap:8px}
.chk-item{display:flex;align-items:center;gap:6px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:13px;transition:all 0.2s}
.chk-item:hover{border-color:#1a56db;background:#eff6ff}
.chk-item.selected{border-color:#1a56db;background:#eff6ff;color:#1a56db;font-weight:500}
.chk-item input{display:none}
.btn{border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#1a56db;color:#fff}
.btn-primary:hover{background:#1e429f}
.btn-secondary{background:#f1f5f9;color:#374151;border:1px solid #e2e8f0}
.btn-secondary:hover{background:#e2e8f0}
.btn-success{background:#059669;color:#fff}
.btn-success:hover{background:#047857}
.btn-danger{background:#dc2626;color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-lg{padding:11px 24px;font-size:15px}
.actions{display:flex;justify-content:space-between;margin-top:20px;align-items:center}

/* FEE CARD */
.fee-box{background:linear-gradient(135deg,#1e429f,#1a56db);color:#fff;border-radius:12px;padding:16px 20px;margin-bottom:16px}
.fee-box h3{font-size:13px;opacity:0.8;margin-bottom:4px}
.fee-total{font-size:32px;font-weight:700;margin-bottom:12px}
.fee-rows{display:flex;flex-direction:column;gap:4px}
.fee-row{display:flex;justify-content:space-between;font-size:13px;opacity:0.9;border-bottom:1px solid rgba(255,255,255,0.15);padding-bottom:4px}
.fee-row:last-child{border-bottom:none;font-weight:600;opacity:1;font-size:14px}

/* REVIEW */
.review-section{margin-bottom:16px}
.review-title{font-size:13px;font-weight:600;color:#374151;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #e2e8f0}
.review-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:6px}
.review-item{display:flex;flex-direction:column;gap:2px}
.review-label{font-size:11px;color:#64748b;font-weight:500}
.review-value{font-size:13px;color:#1a202c;font-weight:500}
.review-item.full{grid-column:1/-1}

/* UPLOAD */
.upload-zone{border:2px dashed #d1d5db;border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.upload-zone:hover{border-color:#1a56db;background:#f8fbff}
.upload-zone.uploaded{border-color:#059669;background:#f0fdf4}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-icon{font-size:28px;margin-bottom:8px}
.upload-text{font-size:13px;color:#64748b}
.upload-text strong{color:#1a56db}
.preview-img{width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid #e2e8f0}
.upload-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px}

/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
.badge-success{background:#d1fae5;color:#059669}
.badge-danger{background:#fee2e2;color:#dc2626}
.badge-warning{background:#fef3c7;color:#d97706}
.badge-info{background:#dbeafe;color:#1a56db}
.badge-gray{background:#f1f5f9;color:#64748b}

/* PAYMENT */
.payment-methods{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr);gap:10px;margin-bottom:16px}
.pay-method{border:2px solid #e2e8f0;border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all 0.2s}
.pay-method:hover{border-color:#1a56db}
.pay-method.active{border-color:#1a56db;background:#eff6ff}
.pay-icon{font-size:24px;margin-bottom:6px}
.pay-name{font-size:12px;font-weight:600;color:#374151}
.upi-input{margin-bottom:12px}

/* SUCCESS */
.success-screen{text-align:center;padding:40px 20px}
.success-icon{font-size:64px;margin-bottom:16px}
.success-title{font-size:24px;font-weight:700;color:#059669;margin-bottom:8px}
@keyframes pop{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.credential-box{background:#1e293b;color:#e2e8f0;border-radius:10px;padding:20px;margin:20px 0;font-family:monospace;text-align:left}
.cred-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cred-key{color:#94a3b8;font-size:13px}
.cred-val{color:#fbbf24;font-size:15px;font-weight:600}
.download-btns{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}

/* ADMIN DASHBOARD */
.admin-layout{display:grid;grid-template-columns:200px minmax(0,1fr);gap:16px;height:calc(100vh - 100px)}
.admin-sidebar{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:12px;display:flex;flex-direction:column;gap:4px;height:fit-content}
.admin-menu-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#374151;transition:all 0.2s;border:none;background:none;width:100%;text-align:left}
.admin-menu-item:hover{background:#f1f5f9}
.admin-menu-item.active{background:#eff6ff;color:#1a56db;font-weight:500}
.admin-menu-item .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.admin-content{overflow:auto}
.stats-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:14px 16px}
.stat-num{font-size:26px;font-weight:700;color:#1a202c}
.stat-label{font-size:12px;color:#64748b;margin-top:2px}
.stat-trend{font-size:11px;color:#059669;margin-top:4px}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{background:#f8fafc;padding:10px 12px;text-align:left;font-weight:600;color:#374151;border-bottom:1px solid #e2e8f0}
.table td{padding:10px 12px;border-bottom:1px solid #f1f5f9;color:#374151;vertical-align:middle}
.table tr:hover td{background:#fafafa}
.table-container{background:#fff;border-radius:10px;border:1px solid #e2e8f0;overflow-x:auto;margin-bottom:16px}

/* FEE EDITOR */
.fee-editor-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px}
.fee-section{background:#fff;border-radius:10px;border:1px solid #e2e8f0;overflow:hidden}
.fee-section-header{background:#f8fafc;padding:12px 16px;border-bottom:1px solid #e2e8f0;font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.fee-section-body{padding:16px}
.fee-field{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fee-field label{flex:1;font-size:13px;color:#374151}
.fee-field input{width:100px;text-align:right}
.toggle{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:#d1d5db;border-radius:12px;cursor:pointer;transition:0.3s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:0.3s}
.toggle input:checked+.toggle-slider{background:#059669}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px)}
.subject-editor{padding:16px}
.subj-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9}
.subj-item:last-child{border-bottom:none}
.subj-name{flex:1;font-size:13px;color:#374151}
.subj-fee{width:80px;text-align:right}
.add-field{display:flex;gap:8px;margin-top:10px}

/* STUDENTS TABLE */
.search-bar{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.search-bar input{flex:1;max-width:280px}
.filter-select{width:140px}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}

/* CONFIRM CHECKBOX */
.confirm-check{display:flex;align-items:flex-start;gap:10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;margin-top:12px;cursor:pointer}
.confirm-check input[type=checkbox]{width:16px;height:16px;accent-color:#059669;flex-shrink:0;margin-top:2px}
.confirm-text{font-size:13px;color:#166534}

/* PAYMENT UI */
.pay-processing{text-align:center;padding:30px}
.spin{width:48px;height:48px;border:4px solid #e2e8f0;border-top:4px solid #1a56db;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

.section-title{font-size:19px;font-weight:700;margin-bottom:4px;color:#1a202c}
.section-sub{font-size:13px;color:#64748b;margin-bottom:20px}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;border:1px solid}
.alert-info{background:#eff6ff;border-color:#bfdbfe;color:#1e40af}
.alert-success{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
.alert-warning{background:#fef3c7;border-color:#fde68a;color:#92400e}

/* ADMIN STUDENT DETAIL */
.detail-header{display:flex;align-items:center;gap:16px;padding:20px;border-bottom:1px solid #e2e8f0;margin-bottom:16px}
.detail-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#1a56db,#1a1f6e);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
.detail-info h2{font-size:18px;font-weight:700}
.detail-info p{font-size:13px;color:#64748b;margin-top:2px}

/* Scrollable admin content */
.admin-content::-webkit-scrollbar{width:6px}
.admin-content::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

/* ─── RESPONSIVE ─── */
@media(max-width:1024px){
  .fee-editor-grid{grid-template-columns:minmax(0,1fr)}
  .stats-grid{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}
}
@media(max-width:900px){
  .admin-layout{display:flex;flex-direction:column;height:auto}
  .admin-sidebar{
    flex-direction:row;
    overflow-x:auto;
    height:auto;
    gap:6px;
    -webkit-overflow-scrolling:touch;
  }
  .admin-menu-item{width:auto;white-space:nowrap;flex-shrink:0}
  .admin-content{overflow:visible}
}
@media(max-width:768px){
  .main{padding:14px}
  .top-bar{flex-wrap:wrap;gap:10px;padding:12px 16px}
  .nav-tabs{width:100%;justify-content:stretch}
  .nav-tab{flex:1;text-align:center}
  .form-grid{grid-template-columns:minmax(0,1fr)}
  .form-grid.cols-3{grid-template-columns:minmax(0,1fr)}
  .review-grid{grid-template-columns:minmax(0,1fr)}
  .upload-row{grid-template-columns:minmax(0,1fr)}
  .payment-methods{grid-template-columns:minmax(0,1fr)}
  .stats-grid{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}
  .card{padding:16px}
  .stepper{justify-content:flex-start}
  .step-connector{width:24px}
  .step-label{display:none}
  .actions{flex-wrap:wrap;gap:10px}
  .actions .btn-lg{width:100%;justify-content:center}
  .download-btns{flex-direction:column}
  .download-btns .btn{width:100%;justify-content:center}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:minmax(0,1fr)}
  .top-bar .logo{font-size:15px}
  .nav-tab{font-size:12px;padding:6px 8px}
  .card-title{font-size:14px}
  .section-title{font-size:17px}
  .fee-total{font-size:26px}
  .credential-box{padding:14px}
  .modal{padding:18px}
  img[alt="Payment QR Code"]{max-width:100%;height:auto !important}
}
</style>
</head>
<body>
<div class="app" id="app">
<div class="top-bar">
  <div class="logo"><span>Zakro</span><span>Academy</span></div>
  <div class="nav-tabs" id="mainNav">
    <button class="nav-tab active" onclick="showSection('admission')">🎓 Admission Form</button>
    <button class="nav-tab" onclick="showSection('admin')">⚙️ Admin Dashboard</button>
  </div>
</div>
<div class="main" id="mainContent"></div>
</div>

<script>
// ================= STATE =================
let currentSection = 'admission';
let currentStep = 1;
let totalSteps = 6;
let currentAdminTab = 'overview';
let selectedPayMethod = 'qr';
let payProcessing = false;
let payDone = false;
let showStudentDetail = null;
let studentModal = null; // null | { mode: 'view'|'edit'|'add', id: string|null }

// Admin auth state
let adminLoggedIn = false;
let adminCredentials = { userId: 'admin', password: 'pass143' };
let adminLoginError = '';

// Admin config (fully editable)
let adminConfig = {
  fees: {
    highSchool: {
      base: 500,
      subjects: {
        'Mathematics': 200, 'Science': 200, 'Social': 150, 'Telugu': 100,
        'Hindi': 100, 'English': 150, 'Urdu': 100, 'Arabic': 100,
        'Physics': 250, 'Biology': 250
      }
    },
    intermediate: { MPC: 3500, BiPC: 3200 },
    diploma: { available: true, fee: 2800 },
    btech: { available: false, btech: 4500, be: 4200 }
  },
  courses: { highschool: true, intermediate: true, diploma: true, btech: false },
  paymentQR: null,  // Admin-uploaded QR code (base64 data URL)
  onlinePaymentAvailable: true  // Toggle online payment on/off
};

// Student form data
let formData = {
  step1: { admDate:'', fullName:'', fatherName:'', fatherOcc:'', motherName:'', motherOcc:'', whatsapp:'', email:'', gender:'', dob:'', emergency:'', address:'', passportPhoto: null, passportPhotoPreview: null },
  step2: { courseType:'', class:'', board:'', subjects:[], course:'', hallTicket:'', diplomaCourse:'', btechStream:'', btechCourse:'', rollNo:'' },
  step3: { reportCard: null, aadhar: null, reportCardPreview: null, aadharPreview: null },
  step4: { confirmed: false },
  step5: { payMethod:'qr', upiId:'', txnId:'', upiApp:'', paymentMode: 'online' },
  step6: {}
};

// Sample students
let students = [
  { id:'123456789001', name:'Aisha Fatima', course:'High School - 9th', status:'Confirmed', date:'2025-06-01', fee:2100, paid:true, paymentMode:'Online', email:'aisha@mail.com', father:'Mohammed Ali', gender:'Female', whatsapp:'9000000001', dob:'2010-03-14', address:'Hyderabad' },
  { id:'123456789002', name:'Ravi Kumar', course:'Intermediate - MPC', status:'Pending', date:'2025-06-05', fee:3500, paid:true, paymentMode:'Online', email:'ravi@mail.com', father:'Suresh Kumar', gender:'Male', whatsapp:'9000000002', dob:'2008-07-22', address:'Secunderabad' },
  { id:'123456789003', name:'Priya Sharma', course:'Diploma - Civil', status:'Submitted', date:'2025-06-08', fee:2800, paid:false, paymentMode:'Offline', email:'priya@mail.com', father:'Ramesh Sharma', gender:'Female', whatsapp:'9000000003', dob:'2007-11-05', address:'Warangal' },
];
let nextStudentNum = 4;
let newStudentId = null;

// ================= HELPERS =================
function today() {
  return new Date().toISOString().slice(0,10);
}
function calcFee() {
  const s2 = formData.step2;
  const fees = adminConfig.fees;
  let base = 0, subFee = 0, label = '';
  if(s2.courseType === 'highschool') {
    base = fees.highSchool.base;
    (s2.subjects||[]).forEach(sub => { subFee += (fees.highSchool.subjects[sub]||0); });
    label = `High School - ${s2.class||''}`;
  } else if(s2.courseType === 'intermediate') {
    base = fees.intermediate[s2.course] || 0;
    label = `Intermediate - ${s2.course||''}`;
  } else if(s2.courseType === 'diploma') {
    base = fees.diploma.fee;
    label = `Diploma - ${s2.diplomaCourse||''}`;
  } else if(s2.courseType === 'btech') {
    base = fees.btech[s2.btechStream.toLowerCase().replace('.','').replace(' ','')] || fees.btech.btech;
    label = `B.Tech/B.E - ${s2.btechCourse||''}`;
  }
  return { base, subFee, total: base + subFee, label };
}

function getInitials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

function getStatusColor(status) {
  if(status==='Confirmed') return 'badge-success';
  if(status==='Pending') return 'badge-warning';
  if(status==='Submitted') return 'badge-info';
  return 'badge-gray';
}

// ================= PDF GENERATION =================
function generateAdmissionPDF() {
  const s1 = formData.step1;
  const s2 = formData.step2;
  const fee = calcFee();
  const doc = new jspdf.jsPDF();
  doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.setTextColor(26,31,110);
  doc.text('ZAKRO ACADEMY', 105, 20, {align:'center'});
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.setTextColor(100,100,100);
  doc.text('Admission Form', 105, 27, {align:'center'});
  doc.setDrawColor(220,220,220); doc.line(10, 32, 200, 32);
  doc.setTextColor(30,30,30); doc.setFontSize(10);
  let y = 40;
  const fields = [
    ['Admission Date', s1.admDate], ['Full Name', s1.fullName],
    ['Father Name', s1.fatherName], ['Father Occupation', s1.fatherOcc],
    ['WhatsApp', s1.whatsapp], ['Gender', s1.gender],
    ['Date of Birth', s1.dob], ['Emergency Number', s1.emergency],
    ['Address', s1.address], ['Course Type', s2.courseType],
    ['Class/Course', fee.label], ['Subjects', (s2.subjects||[]).join(', ')||'N/A'],
    ['Hall Ticket No.', s2.hallTicket||'N/A']
  ];
  fields.forEach(([k,v]) => {
    doc.setFont('helvetica','bold'); doc.text(k+':', 15, y);
    doc.setFont('helvetica','normal'); doc.text(String(v||''), 65, y);
    y += 8;

// ================= RENDER =================
function showSection(sec) {
  currentSection = sec;
  document.querySelectorAll('.nav-tab').forEach((t,i)=>{
    t.classList.toggle('active', (i===0&&sec==='admission')||(i===1&&sec==='admin'));
  });
  renderMain();
}

function renderMain() {
  const el = document.getElementById('mainContent');
  if(currentSection === 'admission') el.innerHTML = renderAdmission();
  else if(currentSection === 'admin') {
    if(!adminLoggedIn) el.innerHTML = renderAdminLogin();
    else el.innerHTML = renderAdmin();
  }
  attachListeners();
}

// ===== ADMISSION FORM =====
function renderAdmission() {
  const steps = ['Basic Info','Education','Documents','Review','Payment','Complete'];
  const stepHTML = steps.map((s,i) => {
    const n = i+1;
    const done = n < currentStep;
    const active = n === currentStep;
    return `<div class="step-item">
      <div class="step-col">
        <div class="step-circle ${done?'done':active?'active':'pending'}">${done?'✓':n}</div>
        <div class="step-label">${s}</div>
      </div>
      ${n < steps.length ? `<div class="step-connector ${done?'done':''}"></div>` : ''}
    </div>`;
  }).join('');

  let body = '';
  if(currentStep===1) body = renderStep1();
  else if(currentStep===2) body = renderStep2();
  else if(currentStep===3) body = renderStep3();
  else if(currentStep===4) body = renderStep4();
  else if(currentStep===5) body = renderStep5();
  else if(currentStep===6) body = renderStep6();

  return `<div style="max-width:700px;margin:0 auto">
    <div class="card" style="margin-bottom:16px">
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:22px;font-weight:700;color:#1a1f6e">🎓 Student Admission Portal</div>
        <div style="font-size:13px;color:#64748b;margin-top:2px">Zakro Academy — Online Enrollment System</div>
      </div>
      <div class="stepper">${stepHTML}</div>
    </div>
    ${body}
  </div>`;
}

function doAdminLogin() {
  const uid = document.getElementById('adminUserId')?.value?.trim();
  const pwd = document.getElementById('adminPassword')?.value;
  if(uid === adminCredentials.userId && pwd === adminCredentials.password) {
    adminLoggedIn = true;
    adminLoginError = '';
    renderMain();
  } else {
    adminLoginError = 'Invalid User ID or Password. Please try again.';
    renderMain();
  }
}

function togglePwdVisibility(inputId, btn) {
  const el = document.getElementById(inputId);
  if(!el) return;
  if(el.type === 'password') { el.type = 'text'; btn.textContent = '🙈'; }
  else { el.type = 'password'; btn.textContent = '👁'; }
}

function adminLogout() {
  adminLoggedIn = false;
  adminLoginError = '';
  currentAdminTab = 'overview';
  renderMain();
}

function renderAdmin() {
  const menuItems = [
    {id:'overview', label:'Overview', icon:'📊'},
    {id:'students', label:'Students', icon:'👥'},
    {id:'fees', label:'Fee Settings', icon:'💰'},
    {id:'subjects', label:'Subjects', icon:'📚'},
    {id:'courses', label:'Course Control', icon:'⚙️'},
    {id:'payment', label:'Payment QR', icon:'📱'},
    {id:'settings', label:'Settings', icon:'🔑'},
  ];

  const sidebar = menuItems.map(m=>`
    <button class="admin-menu-item ${currentAdminTab===m.id?'active':''}" onclick="switchAdminTab('${m.id}')">
      <span>${m.icon}</span> ${m.label}
    </button>`).join('');

  let content = '';
  if(currentAdminTab === 'overview') content = renderAdminOverview();
  else if(currentAdminTab === 'students') content = renderAdminStudents();
  else if(currentAdminTab === 'fees') content = renderAdminFees();
  else if(currentAdminTab === 'subjects') content = renderAdminSubjects();

    const matchStatus = !statusVal || s.status === statusVal;

function renderStudentModal() {
  const { mode, id } = studentModal;
  const s = id ? students.find(x => x.id === id) : null;
  const isView = mode === 'view';
  const isAdd = mode === 'add';
  const title = isAdd ? '➕ Add New Student' : isView ? '👁 Student Details' : '✏️ Edit Student';

  const courses = ['High School - 6th','High School - 7th','High School - 8th','High School - 9th','High School - 10th','Intermediate - MPC','Intermediate - BiPC','Diploma - Civil','Diploma - Mechanical','Diploma - Computer','B.Tech - CSE','B.Tech - ECE','B.E - Civil'];

  const field = (label, key, type='text', opts=null) => {
    const val = s ? (s[key]||'') : '';
    if(isView) {
      return `<div class="field"><label style="color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:0.5px">${label}</label>
        <div style="padding:8px 0;font-size:14px;font-weight:500;color:#1a202c;border-bottom:1px solid #f1f5f9">${val||'—'}</div></div>`;
    }
    if(opts) {
      return `<div class="field"><label>${label}</label>
        <select id="sm_${key}">
          ${opts.map(o=>`<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}
        </select></div>`;
    }
    return `<div class="field"><label>${label}</label>
      <input type="${type}" id="sm_${key}" value="${val}" placeholder="${label}"></div>`;
  };

  return `<div class="modal-overlay" onclick="if(event.target===this)closeStudentModal()">
    <div class="modal" style="max-width:560px;width:95%">

function handleQRUpload(event) {
  const file = event.target.files[0];
  if(!file) return;
  const allowed = ['image/png','image/jpeg','image/jpg','image/webp'];
  if(!allowed.includes(file.type)) { alert('Please upload a PNG, JPG, or WEBP image.'); event.target.value=''; return; }
  if(file.size > 500*1024) { alert(`File too large! Maximum is 500KB.\nYour file: ${(file.size/1024).toFixed(1)}KB`); event.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    adminConfig.paymentQR = e.target.result;
    renderMain();
  };
  reader.readAsDataURL(file);
}

function removeQR() {
  if(confirm('Remove the current QR code?')) { adminConfig.paymentQR = null; renderMain(); }
}

function changeAdminPassword() {
  const cur = document.getElementById('s_currentPwd')?.value;
  const nw = document.getElementById('s_newPwd')?.value;
  const cf = document.getElementById('s_confirmPwd')?.value;
  const msgEl = document.getElementById('pwdMsg');
  if(!cur || !nw || !cf) {
    msgEl.innerHTML = '<div class="alert alert-warning" style="margin-bottom:14px">⚠️ Please fill in all fields.</div>';
    return;
  }
  if(cur !== adminCredentials.password) {
    msgEl.innerHTML = '<div class="alert" style="background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;margin-bottom:14px">❌ Current password is incorrect.</div>';
    return;
  }
  if(nw.length < 6) {
    msgEl.innerHTML = '<div class="alert alert-warning" style="margin-bottom:14px">⚠️ New password must be at least 6 characters.</div>';
    return;
  }
  if(nw !== cf) {
    msgEl.innerHTML = '<div class="alert" style="background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;margin-bottom:14px">❌ New passwords do not match.</div>';
    return;
  }
  adminCredentials.password = nw;
  msgEl.innerHTML = '<div class="alert alert-success" style="margin-bottom:14px">✅ Password updated successfully!</div>';
  document.getElementById('s_currentPwd').value = '';
  document.getElementById('s_newPwd').value = '';
  document.getElementById('s_confirmPwd').value = '';
}

  renderMain();
}

function setPayMethod(m) {
  formData.step5.payMethod = m;
  renderMain();
}

function saveStep1() {
  const fields = ['admDate','fullName','fatherName','fatherOcc','whatsapp','gender','dob','emergency','address'];
  let ok = true;
  fields.forEach(f=>{
    const el = document.getElementById('f_'+f);
    if(el) formData.step1[f] = el.value;
    if(el && !el.value) ok = false;
  });
  const optFields = ['motherName','motherOcc','email'];
  optFields.forEach(f=>{ const el=document.getElementById('f_'+f); if(el) formData.step1[f]=el.value; });
  if(!ok) { alert('Please fill all required fields.'); return; }
  if(!formData.step1.passportPhoto) { alert('Please upload your Passport Size Photo (100–200 KB).'); return; }
  currentStep = 2; renderMain();
}

function saveStep2() {
  const s2 = formData.step2;
  if(!s2.courseType) { alert('Please select a course type.'); return; }
  if(s2.courseType==='highschool') {
    s2.rollNo = document.getElementById('f_rollNo')?.value||'';
    s2.class = document.getElementById('f_class')?.value||'';
    s2.board = document.getElementById('f_board')?.value||'';
    if(!s2.rollNo||!s2.class||!s2.board){ alert('Please fill all required fields.'); return; }
  } else if(s2.courseType==='intermediate') {
    s2.course = document.getElementById('f_course')?.value||'';
    s2.hallTicket = document.getElementById('f_hallTicket')?.value||'';
    if(!s2.course||!s2.hallTicket){ alert('Please fill all required fields.'); return; }
  } else if(s2.courseType==='diploma') {
    if(!adminConfig.fees.diploma.available) { alert('Diploma courses are not available.'); return; }
    s2.hallTicket = document.getElementById('f_hallTicket')?.value||'';
    s2.diplomaCourse = document.getElementById('f_diplomaCourse')?.value||'';
    if(!s2.hallTicket||!s2.diplomaCourse){ alert('Please fill all required fields.'); return; }
  } else if(s2.courseType==='btech') {
    if(!adminConfig.fees.btech.available) { alert('B.Tech/B.E is not available.'); return; }
  }
  currentStep = 3; renderMain();
}

function handleUpload(event, field) {
  const file = event.target.files[0];
  if(!file) return;
  const allowed = ['application/pdf','image/jpeg','image/png','image/jpg'];
  if(!allowed.includes(file.type)) { alert('Invalid file type. Please upload PDF, JPG, or PNG only.'); event.target.value=''; return; }
  if(file.size > 100*1024) { alert(`File too large! Maximum allowed size is 100KB.\nYour file: ${(file.size/1024).toFixed(1)}KB`); event.target.value=''; return; }
  formData.step3[field] = file;
  renderMain();
}

function handlePassportUpload(event) {
  const file = event.target.files[0];
  if(!file) return;
  const allowed = ['image/jpeg','image/jpg','image/png'];
  if(!allowed.includes(file.type)) { alert('Please upload a JPG or PNG image only.'); event.target.value=''; return; }
  const minKB = 100, maxKB = 200;
  const sizeKB = file.size / 1024;
  if(sizeKB < minKB) { alert(`File too small! Minimum size is ${minKB}KB.\nYour file: ${sizeKB.toFixed(1)}KB\n\nTip: Use a higher quality/resolution photo.`); event.target.value=''; return; }
  if(sizeKB > maxKB) { alert(`File too large! Maximum size is ${maxKB}KB.\nYour file: ${sizeKB.toFixed(1)}KB\n\nTip: Compress the image before uploading.`); event.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    formData.step1.passportPhoto = file;
    formData.step1.passportPhotoPreview = e.target.result;
    renderMain();
  };
  reader.readAsDataURL(file);
}

function saveStep3() {
  if(!formData.step3.reportCard) { alert('Please upload your Report Card / Memo.'); return; }
  if(!formData.step3.aadhar) { alert('Please upload your Aadhar Card.'); return; }
  currentStep = 4; renderMain();
}

function saveStep4() {
  if(!formData.step4.confirmed) { alert('Please confirm that all details are correct by checking the checkbox.'); return; }
  currentStep = 5; renderMain();
}

function processPayment() {
  payProcessing = true;
  renderMain();
  setTimeout(()=>{
    payProcessing = false;
    // Generate a unique receipt/transaction reference
    const autoTxn = 'ZA' + Date.now().toString().slice(-10);
    formData.step5.txnId = autoTxn;
    formData.step5.payMethod = 'UPI QR Code';
    formData.step5.paymentMode = 'online';
    const feeInfo = calcFee();
    const newStudent = {
      id: '12345678900' + nextStudentNum,
      name: formData.step1.fullName || 'New Student',
      course: feeInfo.label,
      status: 'Submitted',
      date: today(),
      fee: feeInfo.total,
      paid: true,
      paymentMode: 'Online',
      email: formData.step1.email||'N/A',
      father: formData.step1.fatherName,
      gender: formData.step1.gender
    };
    students.push(newStudent);
    nextStudentNum++;
    currentStep = 6;
    renderMain();
    // Auto-print receipt after a short delay to let DOM settle
    setTimeout(() => generateReceiptPDF(true), 600);
  }, 1800);
}

function processOfflinePayment() {
  payProcessing = true;
  renderMain();
  setTimeout(()=>{
    payProcessing = false;
    const ackNo = generateOfflineAcknowledgmentPDF();
    formData.step5.txnId = ackNo;
    formData.step5.payMethod = 'Offline (Pay at Academy)';
    formData.step5.paymentMode = 'offline';
    const feeInfo = calcFee();
    const newStudent = {
      id: '12345678900' + nextStudentNum,
      name: formData.step1.fullName || 'New Student',
      course: feeInfo.label,
      status: 'Pending',
      date: today(),
      fee: feeInfo.total,
      paid: false,
      paymentMode: 'Offline',
      email: formData.step1.email||'N/A',
      father: formData.step1.fatherName,
      gender: formData.step1.gender
    };
    students.push(newStudent);
    nextStudentNum++;
    currentStep = 6;
    renderMain();
  }, 1400);
}

function confirmStudent(id) {
  const s = students.find(x=>x.id===id);
  if(s) {
    s.status = 'Confirmed';
    alert(`✅ Student ${s.name} has been confirmed!\nStudent ID: ${s.id}\nPassword: ${s.id}\nCredentials will be sent to the student.`);
    renderMain();
  }
}

// ── Student CRUD ──
function openStudentModal(mode, id) {
  studentModal = { mode, id };
  renderMain();
}

function closeStudentModal() {
  studentModal = null;
  renderMain();
}

function deleteStudent(id) {
  const s = students.find(x=>x.id===id);
  if(!s) return;
  if(confirm(`🗑 Delete student "${s.name}"?\n\nThis action cannot be undone.`)) {
    students = students.filter(x=>x.id!==id);
    renderMain();
  }
}

function saveNewStudent() {
  const get = id => document.getElementById('sm_'+id)?.value?.trim() || '';
  const name = get('name');
  if(!name) { alert('Full name is required.'); return; }
  const newId = '12345678900' + nextStudentNum;
  const paid = get('paid') === 'true';
  students.push({
    id: newId,
    name,
    father: get('father'),
    gender: get('gender'),
    dob: get('dob'),
    whatsapp: get('whatsapp'),
    email: get('email'),
    course: get('course') || 'N/A',
    address: get('address'),
    date: get('date') || today(),
    fee: Number(get('fee')) || 0,
    paymentMode: get('paymentMode') || 'Offline',
    paid,
    status: get('status') || 'Pending',
  });
  nextStudentNum++;
  studentModal = null;
  renderMain();
}

function saveEditStudent(id) {
  const s = students.find(x=>x.id===id);
  if(!s) return;
  const get = key => document.getElementById('sm_'+key)?.value?.trim() || '';
  const name = get('name');
  if(!name) { alert('Full name is required.'); return; }
  s.name = name;
  s.father = get('father');
  s.gender = get('gender');
  s.dob = get('dob');
  s.whatsapp = get('whatsapp');
  s.email = get('email');
  s.course = get('course') || s.course;
  s.address = get('address');
  s.date = get('date') || s.date;
  s.fee = Number(get('fee')) || s.fee;
  s.paymentMode = get('paymentMode') || s.paymentMode;
  s.paid = get('paid') === 'true';
  s.status = get('status') || s.status;
  studentModal = null;
  renderMain();
}

function switchAdminTab(tab) {
  currentAdminTab = tab;
  renderMain();
}

function updateFee(key, val) {
  const n = Number(val);
  const f = adminConfig.fees;
  if(key==='hs_base') f.highSchool.base = n;
  else if(key==='int_mpc') f.intermediate.MPC = n;
  else if(key==='int_bipc') f.intermediate.BiPC = n;
  else if(key==='dip_fee') f.diploma.fee = n;
  else if(key==='bt_btech') f.btech.btech = n;
  else if(key==='bt_be') f.btech.be = n;
}

function removeSubject(name) {
  if(confirm(`Remove subject "${name}"?`)) {
    delete adminConfig.fees.highSchool.subjects[name];
    renderMain();
  }
}

function addSubject() {
  const name = document.getElementById('newSubjName')?.value?.trim();
  const fee = Number(document.getElementById('newSubjFee')?.value||0);
  if(!name) { alert('Please enter a subject name.'); return; }
  adminConfig.fees.highSchool.subjects[name] = fee;
  renderMain();
}

function resetForm() {
  formData = {
    step1:{admDate:'',fullName:'',fatherName:'',fatherOcc:'',motherName:'',motherOcc:'',whatsapp:'',email:'',gender:'',dob:'',emergency:'',address:'',passportPhoto:null,passportPhotoPreview:null},
    step2:{courseType:'',class:'',board:'',subjects:[],course:'',hallTicket:'',diplomaCourse:'',btechStream:'',btechCourse:'',rollNo:''},
    step3:{reportCard:null,aadhar:null},step4:{confirmed:false},
    step5:{payMethod:'qr',upiId:'',txnId:'',upiApp:'',paymentMode:'online'},step6:{}
  };
  currentStep = 1;
  newStudentId = null;
  renderMain();
}

function attachListeners() {}

// Init
renderMain();
